# Deployment config for:
#   python main.py --paper
#   python main.py --live
#
# Mode is intentionally not stored here. Choose paper/live at runtime with
# --paper or --live. Use --config only when running an alternate YAML file.
# This file is configured for paper-account order testing. Run with --paper
# and pass --account, or set execution.account in a private local config.
# Add --dry-run at runtime when only signal/order-intent logging is desired.

dry_run: false
lookback_days: 10
position_size_shares: 1
max_order_quantity: 2
thread_pool_workers: 4
session_timezone: America/New_York

logging:
  enabled: true
  log_dir: logs
  profile: owner
  strategy_decisions: full
  decision_scope: every_eval
  bar_detail: relevant
  runtime_level: INFO

api:
  enabled: true
  host: 127.0.0.1
  port: 8550
  token_env: IBKR_LT_API_TOKEN
  log_level: warning

strategies:
  - stoch_3m_cross_long

execution:
  provider: ibkr
  host: 127.0.0.1
  client_id: 1
  # Required for IBKR runs. Keep blank in the shared file; pass --account instead.
  account: ""

data:
  historical:
    provider: ibkr
  live:
    provider: ibkr

# Use this when an existing broker position should be owned by a strategy.
# Required when multiple strategies share the same execution instrument.
adopted_positions:
  - symbol: QQQ
    asset_class: equity
    strategy_id: stoch_3m_cross_long

