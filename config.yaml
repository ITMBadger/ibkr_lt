# Deployment config for:
#   python main.py --paper
#   python main.py --live
#
# Mode is intentionally not stored here. Choose paper/live at runtime with
# --paper or --live. Use --config only when running an alternate YAML file.
# This file is configured for IBKR paper-account order testing. Run with
# --paper to select the paper port. For --live, pass --account or set
# execution.account in a private local config.

lookback_days: 10
position_size_shares: 1
max_order_quantity: 2
thread_pool_workers: 4
session_timezone: America/New_York

# Optional per-strategy live sizing. Startup position mapping uses the same
# configured quantity as new live entries.
strategy_risk:
  stoch_3m_cross_long:
    position_size_shares: 1
    max_order_quantity: 2

logging:
  enabled: true
  log_dir: runs/{mode}
  run_subdir: true
  profile: owner
  strategy_decisions: full
  decision_scope: trigger_and_interval
  decision_interval_minutes: 30
  bar_detail: relevant
  runtime_level: INFO

api:
  enabled: true
  host: 127.0.0.1
  port: 8550
  token_env: IBKR_LT_API_TOKEN
  log_level: warning

strategies:
  # Public sample only. Replace with a private strategy in a local config before
  # any live-capital deployment.
  - stoch_3m_cross_long

# Strategy modes are enforced inside OrderManager.
# live submits native orders; dry_run logs intent without broker submission.
strategy_modes:
  stoch_3m_cross_long: live

execution:
  provider: ibkr
  host: 127.0.0.1
  client_id: 1
  # Required for --live. Auto-detected from TWS session for --paper.
  # Keep blank in the shared file; pass --account or set in a private config.
  account: ""

data:
  historical:
    provider: csv
    path: 'D:\data_s\regular_hour'
    timezone: America/New_York
    rth_only: true
    market_open: "09:30"
    market_close: "16:00"
  live:
    provider: ibkr

# Use this when an existing broker position should be owned by a strategy.
# Required when multiple strategies share the same execution instrument.
adopted_positions:
  - symbol: QQQ
    asset_class: equity
    strategy_id: stoch_3m_cross_long

